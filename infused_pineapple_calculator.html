<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infused Pineapple Calculator — Vice Pizza & Wings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Barlow+Condensed:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --vb: #0D0D0D;
      --vw: #F5F0E8;
      --vo: #FF5F1F;
      --vp: #C4935A;
      --vs: #8A8A8A;
      --vwl: #3D2B1F;
      --vg: #2D3D2E;
      --vp-light: rgba(196, 147, 90, 0.13);
      --vp-mid: rgba(196, 147, 90, 0.22);
      --f-c: 'Barlow Condensed', sans-serif;
      --f-b: 'Barlow', sans-serif;
    }

    html, body {
      background: var(--vb);
      color: var(--vw);
      font-family: var(--f-b);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--vw);
      color: var(--vb);
      position: relative;
      overflow: hidden;
    }

    /* orange left accent bar */
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--vo);
    }

    /* ── Header ── */
    .header {
      background: var(--vb);
      padding: 24px 28px 20px 32px;
      border-bottom: 1px solid rgba(245,240,232,0.06);
    }

    .eyebrow {
      font-family: var(--f-c);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--vo);
      margin-bottom: 6px;
    }

    .title {
      font-family: var(--f-c);
      font-size: 30px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--vw);
    }

    /* ── Input block ── */
    .input-block {
      background: var(--vp-light);
      border-bottom: 1px solid rgba(196,147,90,0.25);
      padding: 20px 28px 20px 32px;
    }

    .input-label {
      font-family: var(--f-c);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--vs);
      margin-bottom: 10px;
      display: block;
    }

    .input-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .pine-input {
      font-family: var(--f-c);
      font-size: 28px;
      font-weight: 700;
      color: var(--vb);
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--vp);
      outline: none;
      width: 130px;
      padding: 2px 4px 4px;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    .pine-input::-webkit-outer-spin-button,
    .pine-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .pine-input:focus { border-bottom-color: var(--vo); }

    .pine-input::placeholder {
      color: rgba(13,13,13,0.25);
      font-weight: 400;
    }

    .unit {
      font-family: var(--f-c);
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--vs);
    }

    /* ── Table ── */
    .table-wrap {
      padding: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      border-bottom: 1px solid rgba(13,13,13,0.18);
    }

    th {
      font-family: var(--f-c);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--vs);
      padding: 10px 12px 9px;
      text-align: left;
    }

    th:first-child { padding-left: 32px; }
    th:last-child  { text-align: right; padding-right: 28px; }

    tbody tr {
      border-bottom: 0.5px solid rgba(13,13,13,0.07);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: rgba(13,13,13,0.025); }

    td {
      padding: 13px 12px;
      vertical-align: middle;
    }

    td:first-child { padding-left: 32px; }
    td:last-child  { padding-right: 28px; text-align: right; }

    .td-name {
      font-family: var(--f-b);
      font-size: 13px;
      font-weight: 500;
      color: var(--vb);
    }

    .td-pct {
      font-family: var(--f-c);
      font-size: 13px;
      font-weight: 500;
      color: var(--vs);
      letter-spacing: 0.04em;
    }

    .td-amt {
      font-family: var(--f-c);
      font-size: 15px;
      font-weight: 700;
      color: var(--vb);
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    .td-amt.empty {
      color: rgba(13,13,13,0.2);
      font-weight: 400;
    }

    /* base row (pineapple) */
    tbody tr.base-row {
      background: var(--vp-mid) !important;
    }

    tbody tr.base-row .td-name {
      font-family: var(--f-c);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    tbody tr.base-row .td-pct { color: var(--vo); font-weight: 700; }

    tbody tr.base-row .td-amt {
      font-size: 17px;
    }

    /* ── Footer note ── */
    .footer-note {
      background: var(--vb);
      padding: 14px 28px 14px 32px;
      font-family: var(--f-c);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.3);
      line-height: 1.7;
    }

    /* ── Logo bar ── */
    .logo-bar {
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-bar svg { opacity: 0.25; }

    .logo-bar span {
      font-family: var(--f-c);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.2);
    }

    /* ── Mobile ── */
    @media (max-width: 520px) {
      body { padding: 24px 12px 48px; justify-content: flex-start; }
      .title { font-size: 24px; }
      .pine-input { font-size: 24px; width: 110px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="header">
      <div class="eyebrow">Vice Pizza &amp; Wings — Recipe Calculator</div>
      <div class="title">Infused Pineapple</div>
    </div>

    <div class="input-block">
      <label class="input-label" for="pine-input">How much pineapple do you have?</label>
      <div class="input-row">
        <input
          class="pine-input"
          id="pine-input"
          type="number"
          min="0"
          placeholder="0"
          autocomplete="off"
          inputmode="numeric"
        >
        <span class="unit">g</span>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Ingredient</th>
            <th>Ratio</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- rows injected by JS -->
        </tbody>
      </table>
    </div>

    <div class="footer-note">
      Quantities scale from pineapple weight — baking percentage method
    </div>

  </div>

  <div class="logo-bar">
    <svg width="52" height="17" viewBox="0 0 255.1 80" fill="#F5F0E8" xmlns="http://www.w3.org/2000/svg">
      <path d="M188.2,49.6l-21.2-4.3s0,0,0,0h0c0,.1,0,.3,0,.4-.6,2.9-1.7,5.4-3.5,7.4-1.1,1.3-2.7,2.2-4.3,2.5-3.7.7-7.4-.8-9.6-3.8,0,0,0-.1-.1-.2,0-.1-.1-.2-.2-.3-.3-.5-.6-1-.8-1.5-.1-.3-.3-.7-.4-1-1.1-3.1-1.7-6.4-1.7-9.7,0-3.3.6-6.6,1.7-9.7.1-.3.3-.7.4-1,.2-.5.5-1,.8-1.5,0-.1.1-.2.2-.3,0,0,0-.1.1-.2,2.2-3.1,5.9-4.5,9.6-3.8,1.7.3,3.2,1.2,4.3,2.5,1.8,2,2.9,4.4,3.5,7.4,0,.1,0,.3,0,.4h0s0,0,0,0l21.2-4.3s0,0,0,0h0c-3-13.1-12.9-21.9-25.7-23.7-.5,0-1.1-.1-1.6-.2-.9-.1-2-.2-3-.2,0,0-.1,0-.2,0-13.5-.2-26.2,7.3-30.8,20.6-.3.9-.6,1.8-.8,2.6,0,0,0,.2,0,.2-.1.4-.2.8-.3,1.3,0,.3-.1.6-.2.9,0,.2-.1.5-.2.7,0,.4-.2.8-.2,1.3,0,.1,0,.3,0,.4,0,.5-.1.9-.2,1.4,0,.1,0,.3,0,.4,0,.5-.1.9-.1,1.4,0,.2,0,.3,0,.5,0,.4,0,.8,0,1.2,0,.2,0,.5,0,.7,0,.3,0,.7,0,1,0,.3,0,.7,0,1,0,.2,0,.5,0,.7,0,.4,0,.8,0,1.2,0,.2,0,.3,0,.5,0,.5,0,.9.1,1.4,0,.1,0,.3,0,.4,0,.5.1,1,.2,1.4,0,.1,0,.3,0,.4,0,.4.2.8.2,1.3,0,.2,0,.5.2.7,0,.3.1.6.2.9.1.4.2.8.3,1.3,0,0,0,.2,0,.2.2.9.5,1.8.8,2.6,4.6,13.3,17.3,20.8,30.8,20.6,0,0,.1,0,.2,0,1.1,0,2.1,0,3-.2.5,0,1.1-.1,1.6-.2,12.8-1.9,22.7-10.7,25.7-23.7h0s0,0,0-.1Z"/>
      <path d="M.1,6.4l-.4-1.1h22.7s12.4,43.7,12.4,43.7L47.4,5.3l21.1.2-21.8,66.1c-.2.7-.8,1.1-1.6,1.1h-21.6c-.7,0-1.3-.5-1.5-1.2L.1,6.4Z"/>
      <polygon points="246.3 30.6 246.4 47.4 222.5 47.5 222.5 55.9 255.1 55.9 255.1 72.7 202.6 72.7 202.6 5.2 254.5 5.5 254.5 22.2 222.6 22.2 222.5 30.7 246.3 30.6"/>
      <path d="M108.2,72.5h-23.4c-.9,0-1.6-.7-1.6-1.6v-38.2s26.7-5.5,26.7-5.5v43.7c0,.9-.8,1.6-1.7,1.6Z"/>
      <path d="M109.9,18.5l-26.8,5.5V7.2c0-.8.7-1.4,1.5-1.4l23.6-.2c.8,0,1.4.6,1.5,1.4l.2,11.5Z"/>
    </svg>
    <span>Vice Pizza &amp; Wings</span>
  </div>

  <script>
    const ingredients = [
      { name: 'Pineapple',     pct: 1.00, base: true  },
      { name: 'Brown Sugar',   pct: 0.12, base: false },
      { name: 'Cider Vinegar', pct: 0.05, base: false },
      { name: 'Chilli Flakes', pct: 0.03, base: false },
      { name: 'Salt',          pct: 0.01, base: false },
    ];

    const tbody = document.getElementById('table-body');

    // Build rows once
    ingredients.forEach((ing, i) => {
      const tr = document.createElement('tr');
      if (ing.base) tr.classList.add('base-row');

      const pctDisplay = (ing.pct * 100) % 1 === 0
        ? (ing.pct * 100) + '%'
        : (ing.pct * 100).toFixed(0) + '%';

      tr.innerHTML = `
        <td class="td-name">${ing.name}</td>
        <td class="td-pct">${pctDisplay}</td>
        <td class="td-amt empty" id="amt-${i}">—</td>
      `;
      tbody.appendChild(tr);
    });

    // Calculate on input
    const input = document.getElementById('pine-input');

    function update() {
      const raw = parseFloat(input.value);
      const valid = !isNaN(raw) && raw > 0;

      ingredients.forEach((ing, i) => {
        const el = document.getElementById('amt-' + i);
        if (valid) {
          el.textContent = Math.round(raw * ing.pct) + ' g';
          el.classList.remove('empty');
        } else {
          el.textContent = '—';
          el.classList.add('empty');
        }
      });
    }

    input.addEventListener('input', update);
    input.focus();
  </script>

</body>
</html>
